# ==========================================
# TMUX 快捷键说明 (快捷键前缀已改为 Ctrl + a)
# ==========================================
# v             - 垂直分屏 (Vertical Split)
# h             - 水平分屏 (Horizontal Split)
# Ctrl + h/j/k/l - 在分屏间移动 (与 Vim 一致)
# c             - 新建窗口 (New Window/Tab)
# d             - 脱离会话 (Detach, 后台运行)
# Ctrl + d       - 关闭当前面板 (Close Pane)
# ==========================================

# --- 基础设置 ---
set -g default-terminal "screen-256color"
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -s escape-time 0

# --- 快捷键重绑定 ---
set -g prefix C-a
unbind C-b
bind C-a send-prefix

bind '|' split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# 复制模式使用 vi 快捷键
setw -g mode-keys vi

# 核心：拖拽结束时强制推送到 pbcopy 并取消选中
unbind -T copy-mode-vi MouseDragEnd1Pane
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"

# 非 vi 模式下的鼠标拖拽处理
unbind -T copy-mode MouseDragEnd1Pane
bind-key -T copy-mode MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"

# 限制滚轮每次只滚动 3 行
bind -T copy-mode-vi WheelUpPane select-pane \; send-keys -X -N 1 scroll-up
bind -T copy-mode-vi WheelDownPane select-pane \; send-keys -X -N 1 scroll-down

# ==========================================
# 莫兰迪高性能状态栏 (C 方案)
# ==========================================
set -g status on
set -g status-interval 2
set -g status-justify left
set -g status-left-length 200
set -g status-right-length 200

# 配色变量
set -g @clr_bg       "#282A36"
set -g @clr_session  "#50FA7B"
set -g @clr_git_bg   "#343746"
set -g @clr_git_fg   "#9FA4B4"
set -g @clr_cpu      "#E2B18A"
set -g @clr_ram      "#98C379"
set -g @clr_net      "#61AFEF"
set -g @clr_weather  "#C678DD"
set -g @clr_time     "#ABB2BF"
set -g @clr_prefix   "#FF5555"

# 天气城市
set -g @weather_loc  "Qufu"

# 脚本路径
set -g @script_dir   "~/.local/bin"

# --- Status Left ---
set -g status-left " #(~/.local/bin/tmux_left_bin '#{session_name}' '#{window_name}' '#{?client_prefix,--prefix}') "

# --- Status Right: C 程序驱动，五段 Powerline ---
set -g status-right " #($HOME/.local/bin/tmux_status_read)"

# --- 窗口列表：透明背景 + 绿色系 Powerline 风格 ---
set -g window-status-style bg=default,fg="#9FA4B4"
set -g window-status-format "#[fg=#9FA4B4,bg=default] #I:#W "
set -g window-status-current-format "#[fg=#282A36,bg=#D19A66] #I:#W #[fg=#D19A66,bg=#282A36]"
set -g window-status-separator ""

# --- 基础背景（终端融为一体） ---
set -g status-bg "#282A36"

# --- 窗口列表样式（简洁） ---
set -g window-status-activity-style bg="#282A36",fg="#ABB2BF"
set -g window-status-bell-style bg="#282A36",fg="#FF5555"

# --- pane 边框 ---
set -g pane-border-style bg="#282A36",fg="#3E4451"
set -g pane-active-border-style bg="#282A36",fg="#50FA7B"
